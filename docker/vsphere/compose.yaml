name: gatewatch

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ${GATEWATCH_IMAGE:-gatewatch:vsphere}
    container_name: ${GATEWATCH_CONTAINER_NAME:-gatewatch-app}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      ACCESS_REGISTER_HOST: "0.0.0.0"
      ACCESS_REGISTER_PORT: "8087"
      ACCESS_REGISTER_DB: "/data/access_register.db"
      ACCESS_REGISTER_AUTH_MODE: "trusted_proxy"
      ACCESS_REGISTER_SCHEDULER: "${ACCESS_REGISTER_SCHEDULER:-1}"
      ACCESS_REGISTER_PROXY_SECRET: "${ACCESS_REGISTER_PROXY_SECRET:?Set ACCESS_REGISTER_PROXY_SECRET in docker/vsphere/.env}"
      ACCESS_REGISTER_ADMIN_GROUPS: "${ACCESS_REGISTER_ADMIN_GROUPS:?Set ACCESS_REGISTER_ADMIN_GROUPS in docker/vsphere/.env}"
      ACCESS_REGISTER_SUPERVISOR_GROUPS: "${ACCESS_REGISTER_SUPERVISOR_GROUPS:-}"
      ACCESS_REGISTER_REVIEWER_GROUPS: "${ACCESS_REGISTER_REVIEWER_GROUPS:-}"
      ACCESS_REGISTER_HR_GROUPS: "${ACCESS_REGISTER_HR_GROUPS:-}"
      ACCESS_REGISTER_READONLY_GROUPS: "${ACCESS_REGISTER_READONLY_GROUPS:-}"
    ports:
      - "${GATEWATCH_BIND_ADDRESS:-127.0.0.1}:${GATEWATCH_APP_PORT:-8087}:8087"
    volumes:
      - gatewatch-data:/data
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    networks:
      - gatewatch-internal
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os, urllib.request; headers={'X-Remote-User':'gatewatch-healthcheck','X-Remote-Name':'Gatewatch Healthcheck','X-Remote-Groups':os.environ.get('ACCESS_REGISTER_ADMIN_GROUPS','')}; secret=os.environ.get('ACCESS_REGISTER_PROXY_SECRET',''); headers.update({'X-Access-Register-Proxy-Secret': secret} if secret else {}); urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8087/api/summary', headers=headers), timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  gatewatch-data:
    name: ${GATEWATCH_DATA_VOLUME:-gatewatch-data}

networks:
  gatewatch-internal:
    name: ${GATEWATCH_NETWORK:-gatewatch-internal}
