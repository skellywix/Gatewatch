name: gatewatch-full-test

services:
  ad:
    build:
      context: ../ad-test
      dockerfile: Dockerfile
    image: ${GATEWATCH_FULL_TEST_AD_IMAGE:-gatewatch-full-test-ad:codex}
    container_name: ${GATEWATCH_FULL_TEST_AD_CONTAINER:-gatewatch-full-ad}
    hostname: ad
    privileged: true
    restart: unless-stopped
    environment:
      SAMBA_REALM: "GATEWATCH.TEST"
      SAMBA_DOMAIN: "GATEWATCH"
      SAMBA_ADMIN_PASSWORD: "${GATEWATCH_FULL_TEST_AD_ADMIN_PASSWORD:-GatewatchTest123!}"
      GATEWATCH_AD_SYNC_PASSWORD: "${GATEWATCH_FULL_TEST_AD_SYNC_PASSWORD:-GatewatchSync123!}"
    volumes:
      - gatewatch-full-ad-lib:/var/lib/samba
      - gatewatch-full-ad-cache:/var/cache/samba
      - gatewatch-full-ad-log:/var/log/samba
    networks:
      - gatewatch-full-test
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          LDAPTLS_REQCERT=never ldapsearch -LLL -H ldaps://127.0.0.1 -D "svc.gatewatch.adsync@GATEWATCH.TEST" -w "$$GATEWATCH_AD_SYNC_PASSWORD" -b "DC=gatewatch,DC=test" "(employeeID=E-AD-5001)" dn >/dev/null
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ${GATEWATCH_FULL_TEST_APP_IMAGE:-gatewatch-full-test-app:codex}
    container_name: ${GATEWATCH_FULL_TEST_APP_CONTAINER:-gatewatch-full-app}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      ACCESS_REGISTER_HOST: "0.0.0.0"
      ACCESS_REGISTER_PORT: "8087"
      ACCESS_REGISTER_DB: "/data/access_register.db"
      ACCESS_REGISTER_AUTH_MODE: "trusted_proxy"
      ACCESS_REGISTER_SCHEDULER: "1"
      ACCESS_REGISTER_PROXY_SECRET: "${GATEWATCH_FULL_TEST_PROXY_SECRET:-GatewatchFullTestProxySecret123!}"
      ACCESS_REGISTER_ADMIN_GROUPS: "${GATEWATCH_FULL_TEST_ADMIN_GROUP:-GATEWATCH\\AccessRegister-Admins}"
      ACCESS_REGISTER_SUPERVISOR_GROUPS: "${GATEWATCH_FULL_TEST_SUPERVISOR_GROUP:-GATEWATCH\\AccessRegister-Supervisors}"
      ACCESS_REGISTER_REVIEWER_GROUPS: "${GATEWATCH_FULL_TEST_REVIEWER_GROUP:-GATEWATCH\\AccessRegister-Reviewers}"
      ACCESS_REGISTER_HR_GROUPS: "${GATEWATCH_FULL_TEST_HR_GROUP:-GATEWATCH\\AccessRegister-HR}"
      ACCESS_REGISTER_READONLY_GROUPS: "${GATEWATCH_FULL_TEST_READONLY_GROUP:-GATEWATCH\\AccessRegister-ReadOnly}"
    ports:
      - "${GATEWATCH_FULL_TEST_BIND_ADDRESS:-127.0.0.1}:${GATEWATCH_FULL_TEST_APP_PORT:-18107}:8087"
    volumes:
      - gatewatch-full-app-data:/data
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    networks:
      - gatewatch-full-test
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os, urllib.request; headers={'X-Remote-User':'gatewatch-healthcheck','X-Remote-Name':'Gatewatch Healthcheck','X-Remote-Groups':os.environ.get('ACCESS_REGISTER_ADMIN_GROUPS','')}; secret=os.environ.get('ACCESS_REGISTER_PROXY_SECRET',''); headers.update({'X-Access-Register-Proxy-Secret': secret} if secret else {}); urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8087/api/summary', headers=headers), timeout=5).read()"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  ad-sync:
    build:
      context: ../ad-sync-test
      dockerfile: Dockerfile
    image: ${GATEWATCH_FULL_TEST_SYNC_IMAGE:-gatewatch-full-test-ad-sync:codex}
    profiles:
      - sync
    depends_on:
      ad:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      AD_LDAP_URI: "ldaps://ad:636"
      AD_BIND_DN: "svc.gatewatch.adsync@GATEWATCH.TEST"
      AD_BIND_PASSWORD: "${GATEWATCH_FULL_TEST_AD_SYNC_PASSWORD:-GatewatchSync123!}"
      AD_BASE_DN: "DC=gatewatch,DC=test"
      AD_LDAP_FILTER: "(&(objectClass=user)(employeeID=*))"
      LDAPTLS_REQCERT: "never"
      GATEWATCH_URL: "http://app:8087"
      GATEWATCH_PROXY_SECRET: "${GATEWATCH_FULL_TEST_PROXY_SECRET:-GatewatchFullTestProxySecret123!}"
      GATEWATCH_SYNC_REMOTE_USER: "GATEWATCH\\svc.gatewatch.adsync"
      GATEWATCH_SYNC_REMOTE_EMAIL: "svc.gatewatch.adsync@gatewatch.test"
      GATEWATCH_SYNC_REMOTE_NAME: "Gatewatch AD Sync Service"
      GATEWATCH_SYNC_REMOTE_GROUPS: "${GATEWATCH_FULL_TEST_ADMIN_GROUP:-GATEWATCH\\AccessRegister-Admins}"
      GATEWATCH_SYNC_SOURCE: "Docker LDAPS service-account sync"
    networks:
      - gatewatch-full-test

volumes:
  gatewatch-full-ad-lib:
    name: ${GATEWATCH_FULL_TEST_AD_LIB_VOLUME:-gatewatch-full-ad-lib}
  gatewatch-full-ad-cache:
    name: ${GATEWATCH_FULL_TEST_AD_CACHE_VOLUME:-gatewatch-full-ad-cache}
  gatewatch-full-ad-log:
    name: ${GATEWATCH_FULL_TEST_AD_LOG_VOLUME:-gatewatch-full-ad-log}
  gatewatch-full-app-data:
    name: ${GATEWATCH_FULL_TEST_APP_DATA_VOLUME:-gatewatch-full-app-data}

networks:
  gatewatch-full-test:
    name: ${GATEWATCH_FULL_TEST_NETWORK:-gatewatch-full-test}
