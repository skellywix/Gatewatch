name: gatewatch-full-test

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ${GATEWATCH_FULL_TEST_APP_IMAGE:-gatewatch-full-test-app:codex}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      GATEWATCH_HOST: "0.0.0.0"
      GATEWATCH_PORT: "8087"
      GATEWATCH_DB: "/data/gatewatch.db"
      GATEWATCH_CONFIG_FILE: "/data/gatewatch.env"
      GATEWATCH_AUTH_MODE: "trusted_proxy"
      GATEWATCH_PROXY_SECRET: "${GATEWATCH_FULL_TEST_PROXY_SECRET:-GatewatchFullTestProxySecret123!}"
      GATEWATCH_ADMIN_GROUP_CANONICAL: "${GATEWATCH_FULL_TEST_ADMIN_GROUP:-GATEWATCH\\Gatewatch-Admins}"
    expose:
      - "8087"
    volumes:
      - gatewatch-full-app-data:/data
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    networks:
      - gatewatch-full-test
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8087/healthz', timeout=5).read()"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  proxy:
    image: ${GATEWATCH_FULL_TEST_APP_IMAGE:-gatewatch-full-test-app:codex}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      app:
        condition: service_healthy
    command:
      - python
      - /proxy/trusted_proxy.py
    environment:
      GATEWATCH_PROXY_HOST: "0.0.0.0"
      GATEWATCH_PROXY_PORT: "8080"
      GATEWATCH_PROXY_TARGET: "http://app:8087"
      GATEWATCH_PROXY_SECRET: "${GATEWATCH_FULL_TEST_PROXY_SECRET:-GatewatchFullTestProxySecret123!}"
      GATEWATCH_PROXY_USER: "${GATEWATCH_FULL_TEST_PROXY_USER:-GATEWATCH\\gw.admin}"
      GATEWATCH_PROXY_NAME: "${GATEWATCH_FULL_TEST_PROXY_NAME:-Grace Admin}"
      GATEWATCH_PROXY_EMAIL: "${GATEWATCH_FULL_TEST_PROXY_EMAIL:-grace.admin@gatewatch.test}"
      GATEWATCH_PROXY_GROUPS: "${GATEWATCH_FULL_TEST_PROXY_GROUPS:-GATEWATCH\\Gatewatch-Admins}"
      GATEWATCH_PROXY_TENANT: "gatewatch-full-test"
    ports:
      - "${GATEWATCH_FULL_TEST_BIND_ADDRESS:-127.0.0.1}:${GATEWATCH_FULL_TEST_PROXY_PORT:-18107}:8080"
    volumes:
      - ./trusted_proxy.py:/proxy/trusted_proxy.py:ro
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=32m
    networks:
      - gatewatch-full-test
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/bootstrap', timeout=5).read()"
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s

  browser-smoke:
    image: ${GATEWATCH_FULL_TEST_APP_IMAGE:-gatewatch-full-test-app:codex}
    profiles:
      - smoke
    depends_on:
      proxy:
        condition: service_healthy
    command:
      - python
      - /smoke/browser_sso_smoke.py
    environment:
      GATEWATCH_BROWSER_SMOKE_URL: "http://proxy:8080"
      GATEWATCH_BROWSER_SMOKE_EXPECTED_EMAIL: "${GATEWATCH_FULL_TEST_PROXY_EMAIL:-grace.admin@gatewatch.test}"
      GATEWATCH_BROWSER_SMOKE_EXPECTED_ADMIN: "1"
    volumes:
      - ./browser_sso_smoke.py:/smoke/browser_sso_smoke.py:ro
    networks:
      - gatewatch-full-test

volumes:
  gatewatch-full-app-data:
    name: ${GATEWATCH_FULL_TEST_APP_DATA_VOLUME:-gatewatch-full-app-data}

networks:
  gatewatch-full-test:
    name: ${GATEWATCH_FULL_TEST_NETWORK:-gatewatch-full-test}
